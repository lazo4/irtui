name: Release

on:
  push:
    branches: [master]
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ github.token }}

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ['ubuntu-latest', 'macos-latest', 'macos-26-intel', 'windows-latest']

    steps:
    - uses: actions/checkout@v6
    - if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y libchafa-dev pkg-config libglib2.0-dev libsysprof-capture-4-dev
        cargo build --release --features chafa-static
    - if: startsWith(matrix.os, 'macos')
      run: | 
        brew install chafa
        cargo build --release --features chafa-dyn
    - if: startsWith(matrix.os, 'windows')
      run: cargo build --release
      
    - if: matrix.os == 'ubuntu-latest'
      run: mv target/release/irtui target/release/irtui-x86_64-linux

    - if: matrix.os == 'macos-latest'
      run: mv target/release/irtui target/release/irtui-aarch64-macos

    - if: matrix.os == 'macos-26-intel'
      run: mv target/release/irtui target/release/irtui-x86_64-macos

    - if: matrix.os == 'windows-latest'
      run: mv target/release/irtui.exe target/release/irtui-x86_64-windows.exe

    - name: Upload release artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: irtui-${{ matrix.os }}
        path: target/release/irtui-*
      
  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./bins
        
    - if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      run: gh release create ${{ github.ref_name }} --notes-from-tag ./bins/**/*
    - if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))
      run: |
        git tag -f nightly
        git push origin tag nightly
        gh release delete nightly --yes || true
        gh release create nightly --prerelease --notes "" ./bins/**/*
